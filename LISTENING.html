<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Thi Nghiêm Túc - GV Thanh Trang</title>
    <style>
        body { margin: 0; font-family: Arial; overflow-x: hidden; background: #000; }
        
        /* Cấu trúc header chứa thông tin và thanh audio */
        header { 
            padding: 10px; 
            background: #2b5a8f; 
            color: white; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        
        header h2 { margin: 0; font-size: 20px; }
        
        /* Style cho khung audio */
        .audio-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 15px;
            border-radius: 30px;
        }
        
        .audio-box audio {
            height: 32px;
            outline: none;
        }
        
        #main-layout { display: flex; height: 85vh; width: 100vw; }
        #pdf-viewer { width: 66%; border: 1px solid #ccc; }
        #form-wrapper { width: 34%; border-left: 2px solid #2b5a8f; background: #fff; }
        
        #fullscreen-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #2b5a8f; color: white; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999; 
            text-align: center; padding: 20px;
        }
        button { padding: 20px 40px; font-size: 22px; cursor: pointer; border-radius: 10px; border: none; background: #ffcc00; font-weight: bold; }
        
        @media (max-width: 768px) {
            #main-layout { flex-direction: column; height: auto; }
            #pdf-viewer, #form-wrapper { width: 100%; height: 50vh; }
            header { 
                flex-direction: column; 
                gap: 10px; 
                font-size: 14px; 
            }
            header h2 { font-size: 16px; }
            .audio-box { width: 100%; justify-content: center; }
            .audio-box audio { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="fullscreen-overlay">
        <h1>TEST 2 LISTENING - GV THANH TRANG</h1>
        <p>Vui lòng nhấn nút để bắt đầu thi</p>
        <button onclick="startExam()">BẮT ĐẦU THI</button>
    </div>

    <header>
        <h2>Đề Thi Reading | Thời gian: <span id="timer">50:00</span></h2>
        
        <div class="audio-box" style="background: none; padding: 0;">
    <iframe src="https://drive.google.com/file/d/11Y5wne7-_W1l5fITpLrV_QIrUYbg5tra/preview" 
            width="300" height="60" frameborder="0" allow="autoplay"></iframe>
</div>
    </header>

    <div id="main-layout">
        <iframe id="pdf-viewer" src="https://drive.google.com/file/d/1A4BLUj_xGczw3a-lnLhYQVzvTmSOCCQD/preview"></iframe>
        <div id="form-wrapper">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSekB_oyAxESlHw2hqkMlHvFPPDIfyg_KFJEM_Ys6w_tDMJ6dA/viewform?embedded=true" 
                    width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        const FINAL_FORM_LINK = "https://forms.gle/1TmcBvZeTKERrpMk8";
        let violations = 0;
        let timeLeft = 50 * 60;

        function startExam() {
            // Ẩn overlay trước
            document.getElementById('fullscreen-overlay').style.display = 'none';

            // Kiểm tra nếu là thiết bị di động thì không ép Fullscreen
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (!isMobile && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Không thể bật toàn màn hình: " + err.message);
                });
            }
        }

        // Theo dõi thoát khỏi toàn màn hình (chỉ hiệu quả trên máy tính)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                violations++;
                alert("CẢNH BÁO " + violations + "/3: Không được thoát toàn màn hình!");
                if(violations >= 3) {
                    window.location.href = FINAL_FORM_LINK;
                } else if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            }
        });

        // Theo dõi rời tab (hiệu quả trên cả máy tính và iPhone)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                violations++;
                alert("CẢNH BÁO " + violations + "/3: Nghiêm cấm rời khỏi trang thi!");
                if (violations >= 3) {
                    window.location.href = FINAL_FORM_LINK;
                }
            }
        });

        setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeLeft <= 0) window.location.href = FINAL_FORM_LINK;
        }, 1000);
    </script>
</body>
</html>
